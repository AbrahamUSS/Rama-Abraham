<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando IEP Corazón de Jesús...</title>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const session = window.SchoolAuth.getSession();
      if (!session) {
        window.location.replace('login.html');
      } else if (session.role === 'docente') {
        window.location.replace('docente.html?u=docen');
      } else if (session.role === 'administrativo') {
        window.location.replace('admin.html?u=dire');
      } else {
        window.location.replace('login.html');
      }
    });
  </script>
</head>
<body style="font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #F8FAFC; color: #8C452B;">
  <div style="text-align: center;">
    <h2 style="margin-bottom: 10px;">Verificando credenciales...</h2>
    <p style="color: #64748B;">Espere un momento, por favor.</p>
  </div>
</body>
</html>
